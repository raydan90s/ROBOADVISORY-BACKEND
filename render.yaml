services:
  - type: web
    name: roboadvisory-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      # --- WhatsApp (Twilio) ---
      # El auth token firma cada webhook: es lo único que distingue a Twilio de
      # cualquiera que haga POST a la URL. Nunca en el repo.
      - key: TWILIO_AUTH_TOKEN
        sync: false
      # Tiene que coincidir CARÁCTER POR CARÁCTER con la URL configurada en la consola
      # de Twilio: la firma se calcula sobre esta cadena.
      - key: TWILIO_WEBHOOK_URL
        value: 
      - key: TWILIO_VALIDAR_FIRMA
        value: "true"
      # El bot corre siempre sobre OpenAI (es donde hay cuota), aunque el front siga
      # ofreciendo el selector de modelos.
      - key: WHATSAPP_AI_PROVIDER
        value: openai
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
